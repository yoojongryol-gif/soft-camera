<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Soft Camera</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden; height: 100dvh;
  display: flex; flex-direction: column;
}
.camera-wrap {
  flex: 1; position: relative;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
video { display: none; }
canvas { width: 100%; height: 100%; object-fit: cover; }

.bottom-bar {
  height: 110px;
  display: flex; align-items: center; justify-content: center; gap: 36px;
  padding-bottom: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.6));
  position: absolute; bottom: 0; left: 0; right: 0;
}

/* 셔터 (사진: 흰색, 녹화중: 빨간색) */
.shutter {
  width: 72px; height: 72px; border-radius: 50%;
  border: 4px solid #fff; background: transparent;
  cursor: pointer; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.shutter::after {
  content: ''; position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border-radius: 50%; background: #fff;
  transition: all 0.2s;
}
.shutter.recording { border-color: #ff3b30; }
.shutter.recording::after {
  background: #ff3b30;
  border-radius: 6px;
  top: 18px; left: 18px; right: 18px; bottom: 18px;
}

.btn-icon {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.15); color: #fff;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

/* 모드 표시 */
.mode-label {
  position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
}
.mode-tabs {
  position: absolute; bottom: 125px;
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 20px;
}
.mode-tab {
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.5); background: none; border: none;
  cursor: pointer; padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
}
.mode-tab.active { color: #fff; }

/* 녹화 시간 */
.rec-timer {
  position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
  font-size: 14px; color: #ff3b30; font-weight: 600;
  display: none; align-items: center; gap: 6px;
}
.rec-timer.show { display: flex; }
.rec-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ff3b30; animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.flash {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #fff; opacity: 0; pointer-events: none; z-index: 100;
}
.flash.active { animation: flash 0.3s ease-out; }
@keyframes flash { 0%{opacity:0.8} 100%{opacity:0} }

.saved-preview {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #000; z-index: 50; display: none; flex-direction: column;
}
.saved-preview.show { display: flex; }
.saved-preview img, .saved-preview video {
  flex: 1; object-fit: contain; width: 100%;
}
.saved-bar {
  height: 80px; display: flex; align-items: center; justify-content: center;
  gap: 30px; padding-bottom: 20px;
}
.saved-bar button {
  padding: 10px 28px; border-radius: 24px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn-back { background: rgba(255,255,255,0.15); color: #fff; }
.btn-save { background: #fff; color: #000; }
</style>
</head>
<body>

<div class="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="preview"></canvas>

  <div class="rec-timer" id="recTimer"><div class="rec-dot"></div><span id="recTime">00:00</span></div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="photo">PHOTO</button>
    <button class="mode-tab" data-mode="video">VIDEO</button>
  </div>

  <div class="bottom-bar">
    <button class="btn-icon" id="btnFlip">&#x21C4;</button>
    <button class="shutter" id="btnShutter"></button>
    <div style="width:44px"></div>
  </div>
</div>

<div class="flash" id="flash"></div>

<div class="saved-preview" id="savedPreview">
  <img id="savedImg" src="" style="display:none">
  <video id="savedVid" controls style="display:none"></video>
  <div class="saved-bar">
    <button class="btn-back" id="btnDiscard">Back</button>
    <button class="btn-save" id="btnDownload">Save</button>
  </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const offCanvas = document.createElement('canvas');
const offCtx = offCanvas.getContext('2d');

// 자동 보정 값 (고정)
const BEAUTY = { blur: 5, bright: 1.25, warm: 20, smooth: 85, spot: 80 };

let facingMode = 'user';
let stream = null;
let animId = null;
let mode = 'photo'; // photo | video
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let recStartTime = 0;
let recTimerInterval = null;

// 카메라 시작
async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: true
    });
    video.srcObject = stream;
    await video.play();
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    offCanvas.width = canvas.width;
    offCanvas.height = canvas.height;
    if (!animId) renderLoop();
  } catch(e) {
    alert('Camera: ' + e.message);
  }
}

// 뽀샤시 렌더링
function renderLoop() {
  if (video.readyState >= 2) {
    const w = canvas.width, h = canvas.height;
    const B = BEAUTY;

    // 1. 원본 (좌우반전)
    offCtx.save();
    if (facingMode === 'user') { offCtx.translate(w, 0); offCtx.scale(-1, 1); }
    offCtx.filter = 'none';
    offCtx.drawImage(video, 0, 0, w, h);
    offCtx.restore();

    // 2. 밝기 + 대비 낮춤 + 채도
    ctx.filter = `brightness(${B.bright}) contrast(0.88) saturate(1.12)`;
    ctx.drawImage(offCanvas, 0, 0);
    ctx.filter = 'none';

    // 3. 피부 스무딩
    if (B.smooth > 0) {
      offCtx.filter = `blur(${8 + B.blur}px)`;
      offCtx.save();
      if (facingMode === 'user') { offCtx.translate(w, 0); offCtx.scale(-1, 1); }
      offCtx.drawImage(video, 0, 0, w, h);
      offCtx.restore();
      offCtx.filter = 'none';
      ctx.globalAlpha = B.smooth / 100 * 0.7;
      ctx.drawImage(offCanvas, 0, 0);
      ctx.globalAlpha = 1.0;
    }

    // 4. 글로우
    if (B.blur > 0) {
      offCtx.filter = `blur(${B.blur * 4}px) brightness(1.4)`;
      offCtx.save();
      if (facingMode === 'user') { offCtx.translate(w, 0); offCtx.scale(-1, 1); }
      offCtx.drawImage(video, 0, 0, w, h);
      offCtx.restore();
      offCtx.filter = 'none';
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.4;
      ctx.drawImage(offCanvas, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1.0;
    }

    // 5. 잡티 제거
    if (B.spot > 0) {
      offCtx.filter = `blur(${3 + B.spot / 15}px)`;
      offCtx.drawImage(canvas, 0, 0);
      offCtx.filter = 'none';
      ctx.globalCompositeOperation = 'lighten';
      ctx.globalAlpha = B.spot / 100 * 0.55;
      ctx.drawImage(offCanvas, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1.0;
    }

    // 6. 따뜻한 톤
    if (B.warm > 0) {
      ctx.fillStyle = `rgba(255, 200, 160, ${B.warm / 150})`;
      ctx.fillRect(0, 0, w, h);
    }

    // 7. 비네팅
    const g = ctx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.75);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, 'rgba(0,0,0,0.18)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }
  animId = requestAnimationFrame(renderLoop);
}

// 사진 촬영
function takePhoto() {
  document.getElementById('flash').classList.add('active');
  setTimeout(() => document.getElementById('flash').classList.remove('active'), 300);
  const c = document.createElement('canvas');
  c.width = canvas.width; c.height = canvas.height;
  c.getContext('2d').drawImage(canvas, 0, 0);
  document.getElementById('savedImg').src = c.toDataURL('image/jpeg', 0.95);
  document.getElementById('savedImg').style.display = '';
  document.getElementById('savedVid').style.display = 'none';
  document.getElementById('savedPreview').classList.add('show');
}

// 동영상 녹화 시작/중지
function toggleRecording() {
  if (!isRecording) {
    // 시작
    recordedChunks = [];
    const canvasStream = canvas.captureStream(30);
    // 오디오 트랙 추가
    if (stream) {
      const audioTracks = stream.getAudioTracks();
      audioTracks.forEach(t => canvasStream.addTrack(t));
    }
    mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm; codecs=vp9' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const vid = document.getElementById('savedVid');
      vid.src = url;
      vid.style.display = '';
      document.getElementById('savedImg').style.display = 'none';
      document.getElementById('savedPreview').classList.add('show');
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('btnShutter').classList.add('recording');
    recStartTime = Date.now();
    document.getElementById('recTimer').classList.add('show');
    recTimerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - recStartTime) / 1000);
      const m = Math.floor(s / 60);
      document.getElementById('recTime').textContent =
        String(m).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }, 500);
  } else {
    // 중지
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('btnShutter').classList.remove('recording');
    document.getElementById('recTimer').classList.remove('show');
    clearInterval(recTimerInterval);
  }
}

// 셔터 버튼
document.getElementById('btnShutter').addEventListener('click', () => {
  if (mode === 'photo') takePhoto();
  else toggleRecording();
});

// 카메라 전환
document.getElementById('btnFlip').addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera();
});

// 모드 전환
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (isRecording) return;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    mode = tab.dataset.mode;
  });
});

// 저장
document.getElementById('btnDownload').addEventListener('click', () => {
  const a = document.createElement('a');
  const now = new Date();
  const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
  if (mode === 'photo' || document.getElementById('savedImg').style.display !== 'none') {
    a.href = document.getElementById('savedImg').src;
    a.download = `soft_${ts}.jpg`;
  } else {
    a.href = document.getElementById('savedVid').src;
    a.download = `soft_${ts}.webm`;
  }
  a.click();
  document.getElementById('savedPreview').classList.remove('show');
});

document.getElementById('btnDiscard').addEventListener('click', () => {
  document.getElementById('savedPreview').classList.remove('show');
});

startCamera();
</script>
</body>
</html>
